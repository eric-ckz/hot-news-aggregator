server:
  port: 8080

spring:
  application:
    name: hot-search-aggregator

  datasource:
    url: jdbc:mysql://localhost:3306/hot_search?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # MyBatis 配置
  mybatis:
    type-aliases-package: com.hotsearch.entity
    configuration:
      map-underscore-to-camel-case: true

  data:
    # Redis 配置
    redis:
      database: 0
      host: localhost
      password: 123456
      timeout: 5000
      port: 6379

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# 爬虫配置
scraper:
  # 初始延迟（毫秒）- 等待应用完全启动后再开始抓取
  initial-delay: 30000
  # 抓取间隔（毫秒）- 5分钟
  interval: 300000
  # 超时时间（秒）
  timeout: 30
  # 平台配置
  platforms:
    weibo:
      enabled: true
      # 微博官方API (已验证可用)
      url: https://weibo.com/ajax/side/hotSearch
    zhihu:
      enabled: true
      # 知乎热搜API
      url: https://api.zhihu.com/topstory/hot-list
    hupu:
      enabled: true
      url: https://bbs.hupu.com/all-gambia
    bilibili:
      enabled: true
      # 哔哩哔哩热门API
      url: https://api.bilibili.com/x/web-interface/popular
    baidu:
      enabled: true
      # 百度需要爬取页面
      url: https://top.baidu.com/board?tab=realtime
    douban:
      enabled: true
      # 豆瓣热门话题
      url: https://www.douban.com/group/explore
    xiaohongshu:
      enabled: true
      # 小红书热搜API (已验证可用)
      url: https://api-hot.imsyy.top/xiaohongshu
    cnblogs:
      enabled: true
      # 博客园热门文章
      url: https://www.cnblogs.com/aggsite/headline
    juejin:
      enabled: true
      # 掘金热门文章API (category_id: 1=后端, 2=前端, 3=Android, 4=iOS)
      url: https://api.juejin.cn/content_api/v1/content/article_rank?category_id=1&type=hot
    oschina:
      enabled: true
      # 开源中国热门资讯 - 使用官方API
      # https://www.oschina.net/ApiHomeNew/homeListByNewType?page=1&pageSize=11&type=9998
      url: https://www.oschina.net/ApiHomeNew/homeListByNewType?type=9998&pageSize=30
    douyin:
      enabled: true
      # 抖音热门视频
      url: https://www.douyin.com/hot
    dongchedi:
      enabled: true
      # 懂车帝热门内容
      url: https://www.dongchedi.com/hot

# 日志配置
logging:
  level:
    com.hotsearch: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
