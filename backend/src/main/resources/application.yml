server:
  port: 8080

spring:
  application:
    name: hot-search-aggregator

  datasource:
    url: jdbc:mysql://localhost:3306/hot_search?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# 爬虫配置
scraper:
  # 抓取间隔（分钟）
  interval: 5
  # 超时时间（秒）
  timeout: 30
  # 平台配置
  platforms:
    weibo:
      enabled: true
      url: https://weibo.com/ajax/side/hotSearch
    zhihu:
      enabled: true
      url: https://www.zhihu.com/api/v3/feed/topstory/hot-lists/total
    hupu:
      enabled: true
      url: https://bbs.hupu.com/all-gambia
    bilibili:
      enabled: true
      url: https://api.bilibili.com/x/web-interface/ranking/v2
    baidu:
      enabled: true
      url: https://top.baidu.com/board?tab=realtime

# 日志配置
logging:
  level:
    com.hotsearch: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
